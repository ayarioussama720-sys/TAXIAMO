<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>TaxiNow Client</title>
  <meta name="theme-color" content="#f0a500"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap');
    :root{--bg:#0d1117;--card:#161b22;--panel:#21262d;--border:#30363d;--gold:#f0a500;--green:#3fb950;--text:#e6edf3;--muted:#8b949e}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
    #topbar{display:flex;align-items:center;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;gap:10px}
    .logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#f0a500,#c47f00);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .logo-text{font-weight:800;font-size:17px}.logo-sub{font-size:10px;color:var(--gold);font-weight:600}
    #msgs{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
    .msg{display:flex;align-items:flex-end;gap:8px;animation:up 0.3s ease}
    .msg.me{justify-content:flex-end}
    .avatar{width:28px;height:28px;border-radius:9px;background:linear-gradient(135deg,#f0a500,#c47f00);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
    .bubble{max-width:80%;padding:11px 15px;font-size:13.5px;line-height:1.6;white-space:pre-wrap}
    .msg.bot .bubble{background:var(--panel);border:1px solid var(--border);border-radius:16px 16px 16px 4px}
    .msg.me .bubble{background:linear-gradient(135deg,#f0a500,#c47f00);border-radius:16px 16px 4px 16px;color:#000;font-weight:600}
    .typing{display:flex;gap:5px;padding:13px 16px}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:blink 1.2s infinite}
    .dot:nth-child(2){animation-delay:0.2s}.dot:nth-child(3){animation-delay:0.4s}
    #qr{padding:8px 14px;display:flex;gap:7px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
    #qr::-webkit-scrollbar{display:none}
    .qbtn{white-space:nowrap;padding:7px 13px;border-radius:20px;border:1px solid var(--border);background:var(--panel);color:var(--muted);font-size:12px;font-family:'Sora',sans-serif;cursor:pointer;flex-shrink:0}
    #bar{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-shrink:0;background:var(--card)}
    #inp{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:11px 14px;color:var(--text);font-size:14px;font-family:'Sora',sans-serif;outline:none}
    #inp::placeholder{color:var(--muted)}
    #sbtn{width:44px;height:44px;border-radius:12px;border:none;background:linear-gradient(135deg,#f0a500,#c47f00);color:#000;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    #sbtn:disabled{background:var(--panel);color:var(--muted)}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
    .modal.hide{display:none}
    .mbox{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:360px}
    .mtitle{font-size:18px;font-weight:800;margin-bottom:8px}
    .msub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5}
    .minp{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:14px;font-family:'Sora',sans-serif;outline:none;margin-bottom:12px}
    .mbtn{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#f0a500,#c47f00);color:#000;font-family:'Sora',sans-serif;font-weight:700;font-size:14px;cursor:pointer}
    .nouveau{margin:0 14px 10px;padding:13px;background:linear-gradient(135deg,#f0a500,#c47f00);border:none;border-radius:14px;color:#000;font-family:'Sora',sans-serif;font-weight:700;font-size:14px;cursor:pointer;display:none}
    .nouveau.on{display:block}
    @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    @keyframes blink{0%,80%,100%{opacity:0.2}40%{opacity:1}}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  </style>
</head>
<body>

<div class="modal" id="key-modal">
  <div class="mbox">
    <div class="mtitle">🔑 Configuration</div>
    <div class="msub">Entrez votre clé API Anthropic une seule fois.</div>
    <input class="minp" id="key-inp" type="password" placeholder="sk-ant-api03-..."/>
    <button class="mbtn" id="key-save">Démarrer 🚖</button>
  </div>
</div>

<div id="topbar">
  <div class="logo-icon">🚖</div>
  <div><div class="logo-text">TaxiNow</div><div class="logo-sub">Client</div></div>
</div>

<div id="msgs"></div>

<button class="nouveau" id="nouveau">➕ Nouvelle course</button>

<div id="qr">
  <button class="qbtn">Maintenant 🕐</button>
  <button class="qbtn">Dans 30 min ⏱</button>
  <button class="qbtn">Aéroport ✈️</button>
  <button class="qbtn">2 passagers 👥</button>
  <button class="qbtn">Gare SNCF 🚉</button>
</div>

<div id="bar">
  <input id="inp" type="text" placeholder="Votre message..." autocomplete="off"/>
  <button id="sbtn">➤</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDy4F5oXiQz_N4eCJ-kLM09GNFxC414fMNCS4U9F4eU",
  authDomain: "taxiamo-ac9f0.firebaseapp.com",
  databaseURL: "https://taxiamo-ac9f0-default-rtdb.firebaseio.com",
  projectId: "taxiamo-ac9f0",
  storageBucket: "taxiamo-ac9f0.appspot.com",
  messagingSenderId: "779304748093",
  appId: "1:779304748093:web:5f10802b8e47c20981d654"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

var API_KEY = '';
var hist = [], busy = false, booked = false;
var SYS = 'Tu es assistant réservation taxi. Collecte : prénom, départ, destination, heure, passagers. Réponds français, chaleureux, concis. Quand tu as TOUT, réponds UNIQUEMENT JSON : {"ok":true,"name":"prénom","from":"départ","to":"destination","time":"heure","pax":N}. Sinon pose questions.';

function init() {
  var k = localStorage.getItem('tn-key');
  if (k) { API_KEY = k; document.getElementById('key-modal').classList.add('hide'); start(); }
}

document.getElementById('key-save').addEventListener('click', function() {
  var k = document.getElementById('key-inp').value.trim();
  if (!k.startsWith('sk-ant-')) { alert('Clé invalide !'); return; }
  API_KEY = k;
  localStorage.setItem('tn-key', k);
  document.getElementById('key-modal').classList.add('hide');
  start();
});

function start() {
  hist = [];
  booked = false;
  document.getElementById('msgs').innerHTML = '';
  document.getElementById('qr').style.display = 'flex';
  document.getElementById('bar').style.display = 'flex';
  document.getElementById('nouveau').classList.remove('on');
  addMsg('assistant', 'Bonjour ! 👋 Je suis votre assistant TaxiNow. Quel est votre prénom ?');
}

document.getElementById('nouveau').addEventListener('click', start);

document.querySelectorAll('.qbtn').forEach(function(b) {
  b.addEventListener('click', function() {
    document.getElementById('inp').value = b.textContent;
    send();
  });
});

document.getElementById('sbtn').addEventListener('click', send);
document.getElementById('inp').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') send();
});

function addMsg(role, txt) {
  hist.push({role: role, content: txt});
  draw();
}

function draw() {
  var c = document.getElementById('msgs');
  c.innerHTML = '';
  hist.forEach(function(m) {
    var d = document.createElement('div');
    d.className = 'msg ' + (m.role === 'user' ? 'me' : 'bot');
    d.innerHTML = m.role === 'assistant' ? '<div class="avatar">🚖</div><div class="bubble">' + m.content + '</div>' : '<div class="bubble">' + m.content + '</div>';
    c.appendChild(d);
  });
  c.scrollTop = c.scrollHeight;
}

function showDots() {
  var c = document.getElementById('msgs');
  var d = document.createElement('div');
  d.className = 'msg bot';
  d.id = 'dots';
  d.innerHTML = '<div class="avatar">🚖</div><div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function hideDots() {
  var d = document.getElementById('dots');
  if (d) d.remove();
}

function send() {
  var inp = document.getElementById('inp');
  var txt = inp.value.trim();
  if (!txt || busy) return;
  inp.value = '';
  addMsg('user', txt);
  busy = true;
  document.getElementById('sbtn').disabled = true;
  showDots();

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 500,
      system: SYS,
      messages: hist.map(function(m) { return {role: m.role, content: m.content}; })
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    hideDots();
    var rep = data.content && data.content[0] ? data.content[0].text : 'Erreur.';
    var clean = rep.replace(/```json/g, '').replace(/```/g, '').trim();
    try {
      var j = JSON.parse(clean);
      if (j.ok) {
        var ride = {
          id: Date.now(),
          name: j.name,
          from: j.from,
          to: j.to,
          time: j.time,
          pax: j.pax,
          status: 'pending',
          at: new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute: '2-digit'})
        };
        db.ref('rides').push(ride);
        booked = true;
        document.getElementById('qr').style.display = 'none';
        document.getElementById('bar').style.display = 'none';
        document.getElementById('nouveau').classList.add('on');
        addMsg('assistant', '✅ Parfait ' + j.name + ' ! Votre taxi est réservé.\n\n🗺 Départ : ' + j.from + '\n🎯 Destination : ' + j.to + '\n🕐 Heure : ' + j.time + '\n👥 Passagers : ' + j.pax + '\n\nBonne route ! 🚖');
        return;
      }
    } catch (e) {}
    addMsg('assistant', rep);
  })
  .catch(function() {
    hideDots();
    addMsg('assistant', 'Erreur de connexion. Réessayez.');
  })
  .finally(function() {
    busy = false;
    document.getElementById('sbtn').disabled = false;
  });
}

init();
</script>
</body>
</html>
