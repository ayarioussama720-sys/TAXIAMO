<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TaxiNow - Chauffeur</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:Arial,sans-serif;min-height:100vh;padding:20px}
h1{font-size:22px;color:#f0a500;margin-bottom:4px}
.sub{font-size:13px;color:#8b949e;margin-bottom:20px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px}
.stat{background:#161b22;border-radius:12px;padding:12px;text-align:center}
.stat-num{font-size:26px;font-weight:800}
.stat-txt{font-size:10px;color:#8b949e;margin-top:2px}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;color:#f0a500;margin:16px 0 8px}
.ride{background:#161b22;border-radius:14px;padding:16px;margin-bottom:10px;border-left:4px solid #f0a500}
.ride.accepted{border-left-color:#3fb950}
.ride.done{border-left-color:#8b949e;opacity:0.6}
.ride-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ride-name{font-weight:700;font-size:16px}
.ride-phone{font-size:13px;color:#f0a500;font-weight:600}
.ride-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.ride-box{background:#21262d;border-radius:10px;padding:10px}
.ride-box-label{font-size:10px;color:#8b949e;margin-bottom:3px}
.ride-box-val{font-size:13px;font-weight:600}
.ride-detail{font-size:12px;color:#8b949e;margin-bottom:12px}
.btns{display:flex;gap:8px}
.btn{flex:1;padding:11px;border-radius:10px;border:none;font-weight:700;font-size:13px;cursor:pointer}
.btn-ok{background:linear-gradient(135deg,#3fb950,#2ea043);color:#fff}
.btn-no{background:rgba(248,81,73,0.15);border:1px solid rgba(248,81,73,0.4);color:#f85149}
.btn-done{background:linear-gradient(135deg,#58a6ff,#1f6feb);color:#fff}
.empty{text-align:center;padding:60px 20px;color:#8b949e}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:999}
.modal.hide{display:none}
.mbox{background:#161b22;border-radius:20px;padding:28px;width:100%;max-width:340px;text-align:center}
.mbox h2{font-size:20px;margin-bottom:8px}
.mbox p{font-size:13px;color:#8b949e;margin-bottom:20px}
.mbox input{width:100%;padding:12px;border-radius:10px;border:none;background:#21262d;color:#e6edf3;font-size:14px;margin-bottom:12px;text-align:center}
.mbox button{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,#f0a500,#c47f00);color:#000;font-weight:700;font-size:15px;cursor:pointer}
</style>
</head>
<body>

<div class="modal" id="modal">
  <div class="mbox">
    <h2>🚗 Chauffeur</h2>
    <p>Entrez le mot de passe</p>
    <input id="pwd" type="password" placeholder="Mot de passe"/>
    <button type="button" onclick="login()">Accéder</button>
  </div>
</div>

<h1>🚗 TaxiNow Chauffeur</h1>
<div class="sub" id="status">Connexion...</div>

<div class="stats">
  <div class="stat"><div class="stat-num" style="color:#f0a500" id="cnt-p">0</div><div class="stat-txt">En attente</div></div>
  <div class="stat"><div class="stat-num" style="color:#3fb950" id="cnt-a">0</div><div class="stat-txt">En cours</div></div>
  <div class="stat"><div class="stat-num" style="color:#8b949e" id="cnt-d">0</div><div class="stat-txt">Terminées</div></div>
</div>

<div id="content"><div class="empty">🔒 Connectez-vous</div></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

  const app = initializeApp({
    apiKey: "AIzaSyDy4F5oXiQz_N4eCJ-kLM09GNFxC414fMNCS4U9F4eU",
    authDomain: "taxiamo-ac9f0.firebaseapp.com",
    databaseURL: "https://taxiamo-ac9f0-default-rtdb.firebaseio.com",
    projectId: "taxiamo-ac9f0",
    storageBucket: "taxiamo-ac9f0.appspot.com",
    messagingSenderId: "779304748093",
    appId: "1:779304748093:web:5f10802b8e47c20981d654"
  });

  const db = getDatabase(app);

  window.login = function(){
    const pwd = document.getElementById('pwd').value;
    if(pwd === 'taxi2026'){
      document.getElementById('modal').classList.add('hide');
      document.getElementById('status').textContent = '🟢 En ligne - Mise à jour en temps réel';
      startListening();
    } else {
      alert('Mot de passe incorrect !');
    }
  }

  document.getElementById('pwd').addEventListener('keypress', e => {
    if(e.key === 'Enter') window.login();
  });

  function startListening(){
    onValue(ref(db, 'rides'), snap => {
      const data = snap.val() || {};
      render(data);
    });
  }

  function render(data){
    const arr = Object.entries(data).map(([k,v]) => ({...v, key:k}))
      .sort((a,b) => new Date(b.created) - new Date(a.created));
    
    const pending = arr.filter(r => r.status === 'pending');
    const accepted = arr.filter(r => r.status === 'accepted');
    const done = arr.filter(r => r.status === 'done');

    document.getElementById('cnt-p').textContent = pending.length;
    document.getElementById('cnt-a').textContent = accepted.length;
    document.getElementById('cnt-d').textContent = done.length;

    let html = '';

    if(pending.length > 0){
      html += '<div class="section-title">🔔 Nouvelles demandes</div>';
      pending.forEach(r => html += card(r));
    }
    if(accepted.length > 0){
      html += '<div class="section-title" style="color:#3fb950">🚗 En cours</div>';
      accepted.forEach(r => html += card(r));
    }
    if(done.length > 0){
      html += '<div class="section-title" style="color:#8b949e">✅ Terminées</div>';
      done.forEach(r => html += card(r));
    }
    if(arr.length === 0){
      html = '<div class="empty"><div style="font-size:48px;margin-bottom:12px">🚖</div>Aucune demande pour le moment</div>';
    }

    document.getElementById('content').innerHTML = html;
  }

  function card(r){
    let html = '<div class="ride '+(r.status !== 'pending' ? r.status : '')+'">';
    html += '<div class="ride-header">';
    html += '<div class="ride-name">👤 '+r.name+'</div>';
    html += '<div class="ride-phone">📞 '+r.phone+'</div>';
    html += '</div>';
    html += '<div class="ride-grid">';
    html += '<div class="ride-box"><div class="ride-box-label">🟢 Départ</div><div class="ride-box-val">'+r.from+'</div></div>';
    html += '<div class="ride-box"><div class="ride-box-label">🔴 Destination</div><div class="ride-box-val">'+r.to+'</div></div>';
    html += '</div>';
    html += '<div class="ride-detail">🕐 '+r.time+' &nbsp;•&nbsp; 👥 '+r.pax+' passager'+(r.pax > 1 ? 's' : '')+'</div>';
    
    if(r.status === 'pending'){
      html += '<div class="btns">';
      html += '<button class="btn btn-ok" onclick="accept(\''+r.key+'\')">✅ Accepter</button>';
      html += '<button class="btn btn-no" onclick="refuse(\''+r.key+'\')">✗ Refuser</button>';
      html += '</div>';
    } else if(r.status === 'accepted'){
      html += '<div class="btns"><button class="btn btn-done" onclick="finish(\''+r.key+'\')">🏁 Course terminée</button></div>';
    }
    
    html += '</div>';
    return html;
  }

  window.accept = function(key){
    update(ref(db, 'rides/'+key), {status: 'accepted'});
  }
  window.refuse = function(key){
    remove(ref(db, 'rides/'+key));
  }
  window.finish = function(key){
    update(ref(db, 'rides/'+key), {status: 'done'});
  }
</script>
</body>
</html>
