<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Allô Taxi - Chauffeur</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:Arial,sans-serif;min-height:100vh;padding:20px}
h1{font-size:22px;color:#f0a500;margin-bottom:4px}
.sub{font-size:13px;color:#8b949e;margin-bottom:16px}
.toggle-bar{display:flex;align-items:center;justify-content:space-between;background:#161b22;border-radius:14px;padding:14px 18px;margin-bottom:16px}
.toggle-info{display:flex;align-items:center;gap:10px}
.toggle-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.dot-on{background:#3fb950}
.dot-off{background:#f85149}
.toggle-label{font-weight:700;font-size:14px}
.toggle-btn{padding:10px 22px;border-radius:10px;border:none;font-weight:700;font-size:13px;cursor:pointer}
.btn-goon{background:#3fb950;color:#fff}
.btn-gooff{background:#f85149;color:#fff}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{flex:1;padding:10px;border-radius:10px;border:none;font-weight:700;font-size:13px;cursor:pointer;background:#21262d;color:#8b949e}
.tab.active{background:#003DA5;color:#fff}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.stat{background:#161b22;border-radius:12px;padding:12px;text-align:center}
.stat-num{font-size:26px;font-weight:800}
.stat-txt{font-size:10px;color:#8b949e;margin-top:2px}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;color:#f0a500;margin:12px 0 8px}
.ride{background:#161b22;border-radius:14px;padding:16px;margin-bottom:10px;border-left:4px solid #f0a500}
.ride.accepted{border-left-color:#3fb950}
.ride.done{border-left-color:#8b949e}
.ride-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ride-name{font-weight:700;font-size:16px}
.ride-phone{font-size:13px;color:#f0a500;font-weight:600}
.ride-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.ride-box{background:#21262d;border-radius:10px;padding:10px}
.ride-box-label{font-size:10px;color:#8b949e;margin-bottom:3px}
.ride-box-val{font-size:13px;font-weight:600}
.ride-detail{font-size:12px;color:#8b949e;margin-bottom:8px}
.distance-box{background:#21262d;border-radius:10px;padding:10px;margin-bottom:12px;display:flex;justify-content:space-between}
.distance-label{font-size:11px;color:#8b949e}
.distance-val{font-size:15px;font-weight:700;color:#58a6ff}
.btns{display:flex;gap:8px}
.btn{flex:1;padding:11px;border-radius:10px;border:none;font-weight:700;font-size:13px;cursor:pointer}
.btn-ok{background:#3fb950;color:#fff}
.btn-no{border:1px solid #f85149;background:transparent;color:#f85149}
.btn-done{background:#58a6ff;color:#fff}
.empty{text-align:center;padding:40px 20px;color:#8b949e}
.hist-date{font-size:11px;color:#8b949e;margin-bottom:4px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:999}
.modal.hide{display:none}
.mbox{background:#161b22;border-radius:20px;padding:28px;width:100%;max-width:340px;text-align:center}
.mbox h2{font-size:20px;margin-bottom:8px}
.mbox p{font-size:13px;color:#8b949e;margin-bottom:20px}
.mbox input{width:100%;padding:12px;border-radius:10px;border:none;background:#21262d;color:#e6edf3;font-size:14px;margin-bottom:12px;text-align:center}
.mbox button{width:100%;padding:13px;border-radius:12px;border:none;background:#f0a500;color:#000;font-weight:700;font-size:15px;cursor:pointer}
.notif{position:fixed;top:20px;right:20px;background:#f0a500;color:#000;padding:14px 20px;border-radius:12px;font-weight:700;font-size:14px;z-index:9999;display:none}
</style>
</head>
<body>

<div class="modal" id="modal">
  <div class="mbox">
    <h2>🚗 Allô Taxi</h2>
    <p>Mot de passe</p>
    <input id="pwd" type="password" placeholder="taxi2026"/>
    <button type="button" id="loginbtn">Accéder</button>
  </div>
</div>

<div class="notif" id="notif">🔔 Nouvelle demande !</div>

<h1>🚗 Allô Taxi - Chauffeur</h1>
<div class="sub" id="sub">Connexion...</div>

<div class="toggle-bar">
  <div class="toggle-info">
    <div class="toggle-dot dot-off" id="toggle-dot"></div>
    <div class="toggle-label" id="toggle-label">Hors ligne</div>
  </div>
  <button class="toggle-btn btn-goon" id="toggle-btn" type="button">Passer en ligne</button>
</div>

<div class="stats">
  <div class="stat"><div class="stat-num" style="color:#f0a500" id="cnt-p">0</div><div class="stat-txt">En attente</div></div>
  <div class="stat"><div class="stat-num" style="color:#3fb950" id="cnt-a">0</div><div class="stat-txt">En cours</div></div>
  <div class="stat"><div class="stat-num" style="color:#8b949e" id="cnt-d">0</div><div class="stat-txt">Terminées</div></div>
</div>

<div class="tabs">
  <button class="tab active" id="tab-live" onclick="showTab('live')">🔔 En direct</button>
  <button class="tab" id="tab-hist" onclick="showTab('hist')">📋 Historique</button>
</div>

<div id="view-live"><div class="empty">🔒 Connectez-vous</div></div>
<div id="view-hist" style="display:none"><div class="empty">Aucun historique</div></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
var db;
var knownRides = {};
var firstLoad = true;
var distCache = {};
var audioCtx = null;
var currentTab = 'live';
var allData = {};
var isOnline = false;

document.getElementById('loginbtn').addEventListener('click', login);
document.getElementById('pwd').addEventListener('keypress', function(e){
  if(e.key === 'Enter') login();
});

function login(){
  var pwd = document.getElementById('pwd').value;
  if(pwd === 'taxi2026'){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    document.getElementById('modal').classList.add('hide');
    document.getElementById('sub').textContent = '🟢 Connecté';
    initFirebase();
  } else {
    alert('Mot de passe incorrect !');
  }
}

function initFirebase(){
  var config = {
    apiKey: "AIzaSyDy4F5oXiQz_N4eCJ-kLM09GNFxC414fMNCS4U9F4eU",
    authDomain: "taxiamo-ac9f0.firebaseapp.com",
    databaseURL: "https://taxiamo-ac9f0-default-rtdb.firebaseio.com",
    projectId: "taxiamo-ac9f0",
    storageBucket: "taxiamo-ac9f0.appspot.com",
    messagingSenderId: "779304748093",
    appId: "1:779304748093:web:5f10802b8e47c20981d654"
  };
  firebase.initializeApp(config);
  db = firebase.database();

  // Surveille le statut
  db.ref('chauffeur_status').on('value', function(snap){
    isOnline = snap.val() === true;
    updateToggleUI();
  });

  // Surveille les courses
  db.ref('rides').on('value', function(snap){
    allData = snap.val() || {};
    checkNew(allData);
    render(allData);
  });

  // Toggle bouton
  document.getElementById('toggle-btn').addEventListener('click', function(){
    db.ref('chauffeur_status').set(!isOnline);
  });
}

function updateToggleUI(){
  var dot = document.getElementById('toggle-dot');
  var label = document.getElementById('toggle-label');
  var btn = document.getElementById('toggle-btn');
  if(isOnline){
    dot.className = 'toggle-dot dot-on';
    label.textContent = 'En ligne — Disponible';
    btn.className = 'toggle-btn btn-gooff';
    btn.textContent = 'Passer hors ligne';
  } else {
    dot.className = 'toggle-dot dot-off';
    label.textContent = 'Hors ligne';
    btn.className = 'toggle-btn btn-goon';
    btn.textContent = 'Passer en ligne';
  }
}

function checkNew(data){
  var pending = Object.keys(data).filter(function(k){ return data[k].status === 'pending'; });
  if(!firstLoad){
    var isNew = pending.some(function(k){ return !knownRides[k]; });
    if(isNew){ playSound(); showNotif(); }
  }
  knownRides = {};
  pending.forEach(function(k){ knownRides[k] = true; });
  firstLoad = false;
}

function playSound(){
  try {
    var notes = [{f:523,t:0,d:0.15},{f:659,t:0.2,d:0.15},{f:784,t:0.4,d:0.3}];
    notes.forEach(function(n){
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = n.f;
      osc.type = 'sine';
      var t = audioCtx.currentTime + n.t;
      gain.gain.setValueAtTime(0.5, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + n.d);
      osc.start(t);
      osc.stop(t + n.d + 0.05);
    });
  } catch(e){}
}

function showNotif(){
  var n = document.getElementById('notif');
  n.style.display = 'block';
  setTimeout(function(){ n.style.display = 'none'; }, 4000);
}

function showTab(tab){
  currentTab = tab;
  document.getElementById('tab-live').className = tab === 'live' ? 'tab active' : 'tab';
  document.getElementById('tab-hist').className = tab === 'hist' ? 'tab active' : 'tab';
  document.getElementById('view-live').style.display = tab === 'live' ? 'block' : 'none';
  document.getElementById('view-hist').style.display = tab === 'hist' ? 'block' : 'none';
  render(allData);
}

function render(data){
  var arr = Object.keys(data).map(function(k){ return Object.assign({key:k}, data[k]); });
  arr.sort(function(a,b){ return new Date(b.created) - new Date(a.created); });

  var pending = arr.filter(function(r){ return r.status === 'pending'; });
  var accepted = arr.filter(function(r){ return r.status === 'accepted'; });
  var done = arr.filter(function(r){ return r.status === 'done'; });

  document.getElementById('cnt-p').textContent = pending.length;
  document.getElementById('cnt-a').textContent = accepted.length;
  document.getElementById('cnt-d').textContent = done.length;

  if(currentTab === 'live'){
    var html = '';
    if(pending.length){
      html += '<div class="section-title">🔔 Nouvelles demandes</div>';
      pending.forEach(function(r){ html += card(r); });
    }
    if(accepted.length){
      html += '<div class="section-title" style="color:#3fb950">🚗 En cours</div>';
      accepted.forEach(function(r){ html += card(r); });
    }
    if(!pending.length && !accepted.length){
      html = '<div class="empty"><div style="font-size:48px;margin-bottom:12px">🚖</div>Aucune demande</div>';
    }
    document.getElementById('view-live').innerHTML = html;
  } else {
    var hhtml = '';
    if(done.length){
      done.forEach(function(r){
        var date = r.created ? new Date(r.created).toLocaleDateString('fr-CA',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
        hhtml += '<div class="ride done">';
        hhtml += '<div class="hist-date">'+date+'</div>';
        hhtml += '<div class="ride-header"><div class="ride-name">👤 '+r.name+'</div><div class="ride-phone">📞 '+r.phone+'</div></div>';
        hhtml += '<div class="ride-grid">';
        hhtml += '<div class="ride-box"><div class="ride-box-label">🟢 Départ</div><div class="ride-box-val">'+r.from+'</div></div>';
        hhtml += '<div class="ride-box"><div class="ride-box-label">🔴 Destination</div><div class="ride-box-val">'+r.to+'</div></div>';
        hhtml += '</div>';
        hhtml += '<div class="ride-detail">🕐 '+r.time+' • 👥 '+r.pax+' passager'+(r.pax>1?'s':'')+'</div>';
        hhtml += '</div>';
      });
    } else {
      hhtml = '<div class="empty">Aucune course terminée</div>';
    }
    document.getElementById('view-hist').innerHTML = hhtml;
  }

  document.querySelectorAll('[data-accept]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var key = btn.dataset.accept;
      db.ref('rides/'+key).transaction(function(ride){
        if(ride && ride.status === 'pending'){
          ride.status = 'accepted';
          return ride;
        }
        return;
      }, function(error, committed){
        if(!committed) alert('Cette course a déjà été acceptée !');
      });
    });
  });

  document.querySelectorAll('[data-refuse]').forEach(function(btn){
    btn.addEventListener('click', function(){ db.ref('rides/'+btn.dataset.refuse).remove(); });
  });

  document.querySelectorAll('[data-finish]').forEach(function(btn){
    btn.addEventListener('click', function(){ db.ref('rides/'+btn.dataset.finish+'/status').set('done'); });
  });

  pending.forEach(function(r){
    var cacheKey = r.from+'|'+r.to;
    if(distCache[cacheKey]){
      updateDist(r.key, distCache[cacheKey]);
    } else {
      calcDist(r.from, r.to, r.key);
    }
  });
}

function card(r){
  var color = r.status === 'pending' ? '#f0a500' : '#3fb950';
  var html = '<div class="ride '+(r.status==='accepted'?'accepted':'')+'" style="border-left-color:'+color+'">';
  html += '<div class="ride-header"><div class="ride-name">👤 '+r.name+'</div><div class="ride-phone">📞 '+r.phone+'</div></div>';
  html += '<div class="ride-grid">';
  html += '<div class="ride-box"><div class="ride-box-label">🟢 Départ</div><div class="ride-box-val">'+r.from+'</div></div>';
  html += '<div class="ride-box"><div class="ride-box-label">🔴 Destination</div><div class="ride-box-val">'+r.to+'</div></div>';
  html += '</div>';
  html += '<div class="ride-detail">🕐 '+r.time+' • 👥 '+r.pax+' passager'+(r.pax>1?'s':'')+'</div>';
  html += '<div class="distance-box" id="dist-'+r.key+'"><div><div class="distance-label">📍 Distance</div><div class="distance-val">Calcul...</div></div></div>';
  if(r.status === 'pending'){
    html += '<div class="btns"><button class="btn btn-ok" data-accept="'+r.key+'">✅ Accepter</button><button class="btn btn-no" data-refuse="'+r.key+'">✗ Refuser</button></div>';
  } else if(r.status === 'accepted'){
    html += '<div class="btns"><button class="btn btn-done" data-finish="'+r.key+'">🏁 Course terminée</button></div>';
  }
  html += '</div>';
  return html;
}

function calcDist(from, to, key){
  var q1 = encodeURIComponent(from+', Quebec, Canada');
  var q2 = encodeURIComponent(to+', Quebec, Canada');
  fetch('https://nominatim.openstreetmap.org/search?q='+q1+'&format=json&limit=1')
  .then(function(r){ return r.json(); })
  .then(function(d1){
    if(!d1.length) return;
    fetch('https://nominatim.openstreetmap.org/search?q='+q2+'&format=json&limit=1')
    .then(function(r){ return r.json(); })
    .then(function(d2){
      if(!d2.length) return;
      var url = 'https://router.project-osrm.org/route/v1/driving/'+d1[0].lon+','+d1[0].lat+';'+d2[0].lon+','+d2[0].lat+'?overview=false';
      fetch(url).then(function(r){ return r.json(); }).then(function(rd){
        if(rd.routes && rd.routes.length){
          var km = (rd.routes[0].distance/1000).toFixed(1);
          var mins = Math.round(rd.routes[0].duration/60);
          distCache[from+'|'+to] = {km:km, mins:mins};
          updateDist(key, {km:km, mins:mins});
        }
      });
    });
  }).catch(function(){});
}

function updateDist(key, dist){
  var el = document.getElementById('dist-'+key);
  if(el){
    el.innerHTML = '<div><div class="distance-label">📍 Distance</div><div class="distance-val">'+dist.km+' km</div></div><div><div class="distance-label">⏱ Durée</div><div class="distance-val">'+dist.mins+' min</div></div>';
  }
}
</script>
</body>
</html>
