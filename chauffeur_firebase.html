<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaxiNow Chauffeur</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap');
    :root{--bg:#0d1117;--card:#161b22;--panel:#21262d;--gold:#f0a500;--green:#3fb950;--red:#f85149;--text:#e6edf3;--muted:#8b949e}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
    #topbar{padding:12px 16px;background:var(--card);display:flex;align-items:center;gap:10px;flex-shrink:0}
    .logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#f0a500,#c47f00);display:flex;align-items:center;justify-content:center;font-size:18px}
    #content{flex:1;overflow-y:auto;padding:14px}
    .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
    .stat{background:var(--panel);border-radius:12px;padding:12px;text-align:center}
    .stat-num{font-size:24px;font-weight:800}
    .stat-txt{font-size:10px;color:var(--muted);margin-top:2px}
    .title{font-size:11px;font-weight:700;text-transform:uppercase;margin:12px 0 4px 0;color:var(--gold)}
    .ride{background:var(--panel);border-radius:14px;padding:14px;margin-bottom:8px;border-left:4px solid var(--gold)}
    .ride-name{font-weight:700;font-size:15px;margin-bottom:8px}
    .ride-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;font-size:12px}
    .ride-box{background:var(--bg);border-radius:10px;padding:9px}
    .ride-box-label{font-size:10px;color:var(--muted);margin-bottom:3px}
    .ride-box-val{font-size:13px;font-weight:600}
    .ride-btns{display:flex;gap:8px}
    .btn{flex:1;padding:10px;border-radius:10px;border:none;font-family:'Sora',sans-serif;font-weight:700;font-size:13px;cursor:pointer}
    .btn-ok{background:linear-gradient(135deg,var(--green),#2ea043);color:#fff}
    .btn-no{background:rgba(248,81,73,0.12);border:1px solid rgba(248,81,73,0.3);color:var(--red)}
    .btn-done{background:linear-gradient(135deg,#58a6ff,#1f6feb);color:#fff}
    .empty{text-align:center;padding:60px 20px;color:var(--muted)}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:999}
    .modal.hide{display:none}
    .mbox{background:var(--card);border-radius:20px;padding:24px;width:100%;max-width:360px;text-align:center}
    .mbox h2{font-size:18px;margin-bottom:8px}
    .mbox p{font-size:13px;color:var(--muted);margin-bottom:20px}
    .mbox input{width:100%;padding:12px;border-radius:12px;border:none;background:var(--panel);color:var(--text);margin-bottom:12px;font-family:'Sora',sans-serif}
    .mbox button{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#f0a500,#c47f00);color:#000;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;font-size:14px}
  </style>
</head>
<body>

<div class="modal" id="modal">
  <div class="mbox">
    <h2>🚗 Chauffeur</h2>
    <p>Mot de passe</p>
    <input id="pwd" type="password" placeholder="taxi2026"/>
    <button type="button" onclick="login()">Accéder</button>
  </div>
</div>

<div id="topbar">
  <div class="logo-icon">🚗</div>
  <div style="font-weight:800">TaxiNow Chauffeur</div>
</div>

<div id="content">
  <div class="stats" id="stats"></div>
  <div id="rides"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>

<script>
const config = {
  apiKey: "AIzaSyDy4F5oXiQz_N4eCJ-kLM09GNFxC414fMNCS4U9F4eU",
  authDomain: "taxiamo-ac9f0.firebaseapp.com",
  databaseURL: "https://taxiamo-ac9f0-default-rtdb.firebaseio.com",
  projectId: "taxiamo-ac9f0",
  storageBucket: "taxiamo-ac9f0.appspot.com",
  messagingSenderId: "779304748093",
  appId: "1:779304748093:web:5f10802b8e47c20981d654"
};

firebase.initializeApp(config);
const db = firebase.database();

let rides = {};

function login(){
  const pwd = document.getElementById('pwd').value;
  if(pwd === 'taxi2026'){
    document.getElementById('modal').classList.add('hide');
    loadRides();
    setInterval(loadRides, 2000);
  } else {
    alert('Mot de passe incorrect');
  }
}

function loadRides(){
  db.ref('rides').once('value', snap => {
    rides = snap.val() || {};
    render();
  });
}

function render(){
  const arr = Object.entries(rides).map(([k,v]) => ({...v, key: k}));
  const pending = arr.filter(r => r.status === 'pending');
  const accepted = arr.filter(r => r.status === 'accepted');
  const done = arr.filter(r => r.status === 'done');
  
  document.getElementById('stats').innerHTML = 
    '<div class="stat"><div class="stat-num" style="color:var(--gold)">'+pending.length+'</div><div class="stat-txt">En attente</div></div>'+
    '<div class="stat"><div class="stat-num" style="color:var(--green)">'+accepted.length+'</div><div class="stat-txt">En cours</div></div>'+
    '<div class="stat"><div class="stat-num" style="color:var(--muted)">'+done.length+'</div><div class="stat-txt">Terminées</div></div>';
  
  let html = '';
  if(pending.length > 0){
    html += '<div class="title">🔔 Nouvelles</div>';
    pending.forEach(r => html += rideCard(r, true));
  }
  if(accepted.length > 0){
    html += '<div class="title" style="color:var(--green);margin-top:8px">🚗 En cours</div>';
    accepted.forEach(r => html += rideCard(r, false));
  }
  if(done.length > 0){
    html += '<div class="title" style="color:var(--muted);margin-top:8px">Terminées</div>';
    done.forEach(r => html += rideCard(r, false));
  }
  if(arr.length === 0){
    html = '<div class="empty"><div style="font-size:52px;margin-bottom:14px">🚖</div>Aucune demande</div>';
  }
  
  document.getElementById('rides').innerHTML = html;
}

function rideCard(r, isPending){
  let color = r.status === 'pending' ? 'var(--gold)' : r.status === 'accepted' ? 'var(--green)' : 'var(--muted)';
  let html = '<div class="ride" style="border-left-color:'+color+'">';
  html += '<div class="ride-name">👤 '+r.name+'</div>';
  html += '<div class="ride-info">';
  html += '<div class="ride-box"><div class="ride-box-label">🟢 Départ</div><div class="ride-box-val">'+r.from+'</div></div>';
  html += '<div class="ride-box"><div class="ride-box-label">🔴 Arrivée</div><div class="ride-box-val">'+r.to+'</div></div>';
  html += '</div>';
  html += '<div style="font-size:12px;color:var(--muted);margin-bottom:8px">🕐 '+r.time+' • 👥 '+r.pax+' passager'+(r.pax > 1 ? 's' : '')+'</div>';
  
  if(isPending){
    html += '<div class="ride-btns">';
    html += '<button class="btn btn-ok" type="button" onclick="accept(\''+r.key+'\')">✅ Accepter</button>';
    html += '<button class="btn btn-no" type="button" onclick="refuse(\''+r.key+'\')">✗ Refuser</button>';
    html += '</div>';
  } else if(r.status === 'accepted'){
    html += '<div class="ride-btns"><button class="btn btn-done" type="button" onclick="finish(\''+r.key+'\')">🏁 Terminée</button></div>';
  }
  
  html += '</div>';
  return html;
}

function accept(key){
  db.ref('rides/'+key+'/status').set('accepted');
}

function refuse(key){
  db.ref('rides/'+key).remove();
}

function finish(key){
  db.ref('rides/'+key+'/status').set('done');
}

document.getElementById('pwd').addEventListener('keypress', e => {
  if(e.key === 'Enter') login();
});
</script>
</body>
</html>
