<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ALLOTAXI - Client</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#161b22;border-radius:20px;padding:24px;width:100%;max-width:420px}
h1{font-size:22px;margin-bottom:6px;color:#f0a500}
p{font-size:13px;color:#8b949e;margin-bottom:20px}
label{font-size:12px;color:#8b949e;display:block;margin-bottom:4px;margin-top:12px}
input,select{width:100%;padding:12px;border-radius:10px;border:none;background:#21262d;color:#e6edf3;font-size:14px}
.btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#f0a500,#c47f00);color:#000;font-weight:700;font-size:16px;cursor:pointer;margin-top:20px}
.success{background:#1a3a2a;border:1px solid #3fb950;border-radius:12px;padding:16px;margin-top:16px;display:none;text-align:center;color:#3fb950;font-weight:600}
</style>
</head>
<body>
<div class="card">
  <h1>🚖 TaxiNow</h1>
  <p>Réservez votre taxi en quelques secondes</p>
  
  <label>Votre prénom</label>
  <input id="name" type="text" placeholder="Ex: Oussama"/>
  
  <label>Votre numéro de téléphone</label>
  <input id="phone" type="tel" placeholder="Ex: 514-555-1234"/>
  
  <label>Lieu de prise en charge</label>
  <input id="from" type="text" placeholder="Ex: 2330 Ave Chapdelaine"/>
  
  <label>Destination</label>
  <input id="to" type="text" placeholder="Ex: Aéroport Montréal"/>
  
  <label>Heure de prise en charge</label>
  <input id="time" type="time"/>
  
  <label>Nombre de passagers</label>
  <select id="pax">
    <option value="1">1 passager</option>
    <option value="2">2 passagers</option>
    <option value="3">3 passagers</option>
    <option value="4">4 passagers</option>
  </select>
  
  <button class="btn" onclick="submit()">🚖 Envoyer la demande</button>
  
  <div class="success" id="success">
    ✅ Demande envoyée ! Un chauffeur vous contactera bientôt.
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

  const app = initializeApp({
    apiKey: "AIzaSyDy4F5oXiQz_N4eCJ-kLM09GNFxC414fMNCS4U9F4eU",
    authDomain: "taxiamo-ac9f0.firebaseapp.com",
    databaseURL: "https://taxiamo-ac9f0-default-rtdb.firebaseio.com",
    projectId: "taxiamo-ac9f0",
    storageBucket: "taxiamo-ac9f0.appspot.com",
    messagingSenderId: "779304748093",
    appId: "1:779304748093:web:5f10802b8e47c20981d654"
  });

  const db = getDatabase(app);

  window.submit = function(){
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const from = document.getElementById('from').value.trim();
    const to = document.getElementById('to').value.trim();
    const time = document.getElementById('time').value;
    const pax = document.getElementById('pax').value;

    if(!name || !phone || !from || !to || !time){
      alert('Veuillez remplir tous les champs !');
      return;
    }

    push(ref(db, 'rides'), {
      name, phone, from, to, time, pax,
      status: 'pending',
      created: new Date().toISOString()
    }).then(() => {
      document.getElementById('success').style.display = 'block';
      document.getElementById('name').value = '';
      document.getElementById('phone').value = '';
      document.getElementById('from').value = '';
      document.getElementById('to').value = '';
      document.getElementById('time').value = '';
    }).catch(e => alert('Erreur: ' + e.message));
  }
</script>
</body>
</html>
