<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Allô Taxi - Réservation</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#161b22;border-radius:20px;padding:24px;width:100%;max-width:420px}
h1{font-size:22px;margin-bottom:6px;color:#f0a500}
p{font-size:13px;color:#8b949e;margin-bottom:20px}
label{font-size:12px;color:#8b949e;display:block;margin-bottom:4px;margin-top:12px}
input,select{width:100%;padding:12px;border-radius:10px;border:none;background:#21262d;color:#e6edf3;font-size:14px}
.btn{width:100%;padding:14px;border-radius:12px;border:none;background:#f0a500;color:#000;font-weight:700;font-size:16px;cursor:pointer;margin-top:20px}
.tracking{display:none;text-align:center;padding:20px 0}
.tracking h2{font-size:18px;margin-bottom:20px;color:#f0a500}
.steps{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.step{display:flex;align-items:center;gap:12px;padding:14px;border-radius:12px;background:#21262d;opacity:0.4}
.step.active{opacity:1;border:1px solid #f0a500}
.step.done{opacity:1;border:1px solid #3fb950}
.step.accepted{opacity:1;border:1px solid #3fb950;background:#1a3a2a}
.step-icon{font-size:24px;width:36px;text-align:center}
.step-text{text-align:left}
.step-title{font-weight:700;font-size:14px}
.step-sub{font-size:12px;color:#8b949e;margin-top:2px}
.btn-new{width:100%;padding:12px;border-radius:12px;border:none;background:#21262d;color:#e6edf3;font-weight:700;font-size:14px;cursor:pointer;margin-top:12px}
</style>
</head>
<body>
<div class="card">
  <div id="form-view">
    <h1>🚖 Allô Taxi</h1>
    <p>Réservez votre taxi en quelques secondes</p>
    <label>Votre prénom</label>
    <input id="name" type="text" placeholder="Ex: Oussama"/>
    <label>Votre numéro de téléphone</label>
    <input id="phone" type="tel" placeholder="Ex: 514-555-1234"/>
    <label>Lieu de prise en charge</label>
    <input id="from" type="text" placeholder="Ex: 2330 Ave Chapdelaine"/>
    <label>Destination</label>
    <input id="to" type="text" placeholder="Ex: Aéroport Montréal"/>
    <label>Heure de prise en charge</label>
    <input id="time" type="time"/>
    <label>Nombre de passagers</label>
    <select id="pax">
      <option value="1">1 passager</option>
      <option value="2">2 passagers</option>
      <option value="3">3 passagers</option>
      <option value="4">4 passagers</option>
    </select>
    <button class="btn" id="sendbtn">🚖 Envoyer la demande</button>
  </div>

  <div class="tracking" id="tracking-view">
    <h2>🚖 Suivi de votre course</h2>
    <div class="steps">
      <div class="step active" id="step1">
        <div class="step-icon">📋</div>
        <div class="step-text">
          <div class="step-title">Demande envoyée</div>
          <div class="step-sub">En attente d'un chauffeur...</div>
        </div>
      </div>
      <div class="step" id="step2">
        <div class="step-icon">🚗</div>
        <div class="step-text">
          <div class="step-title">Chauffeur accepté</div>
          <div class="step-sub" id="step2-sub">En attente...</div>
        </div>
      </div>
      <div class="step" id="step3">
        <div class="step-icon">✅</div>
        <div class="step-text">
          <div class="step-title">Course terminée</div>
          <div class="step-sub">Merci d'avoir choisi Allô Taxi !</div>
        </div>
      </div>
    </div>
    <button class="btn-new" id="newbtn">➕ Nouvelle réservation</button>
  </div>
</div>

<script>
var currentRideKey = null;
var audioCtx = null;
var db = null;

function playAcceptSound(){
  try {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var notes = [{f:523,t:0,d:0.15},{f:659,t:0.2,d:0.15},{f:784,t:0.4,d:0.3}];
    notes.forEach(function(n){
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = n.f;
      osc.type = 'sine';
      var t = audioCtx.currentTime + n.t;
      gain.gain.setValueAtTime(0.5, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + n.d);
      osc.start(t);
      osc.stop(t + n.d + 0.05);
    });
  } catch(e){}
}

function initFirebase(){
  var config = {
    apiKey: "AIzaSyDy4F5oXiQz_N4eCJ-kLM09GNFxC414fMNCS4U9F4eU",
    authDomain: "taxiamo-ac9f0.firebaseapp.com",
    databaseURL: "https://taxiamo-ac9f0-default-rtdb.firebaseio.com",
    projectId: "taxiamo-ac9f0",
    storageBucket: "taxiamo-ac9f0.appspot.com",
    messagingSenderId: "779304748093",
    appId: "1:779304748093:web:5f10802b8e47c20981d654"
  };
  firebase.initializeApp(config);
  db = firebase.database();
}

function watchRide(key){
  db.ref('rides/'+key).on('value', function(snap){
    var ride = snap.val();
    if(!ride) return;
    if(ride.status === 'accepted'){
      document.getElementById('step1').className = 'step done';
      document.getElementById('step2').className = 'step accepted';
      document.getElementById('step2-sub').textContent = 'Le chauffeur arrive !';
      playAcceptSound();
    } else if(ride.status === 'done'){
      document.getElementById('step1').className = 'step done';
      document.getElementById('step2').className = 'step done';
      document.getElementById('step3').className = 'step accepted';
    }
  });
}

document.getElementById('sendbtn').addEventListener('click', function(){
  var name = document.getElementById('name').value.trim();
  var phone = document.getElementById('phone').value.trim();
  var from = document.getElementById('from').value.trim();
  var to = document.getElementById('to').value.trim();
  var time = document.getElementById('time').value;
  var pax = document.getElementById('pax').value;

  if(!name || !phone || !from || !to || !time){
    alert('Veuillez remplir tous les champs !');
    return;
  }

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  var ref = db.ref('rides').push({
    name:name, phone:phone, from:from, to:to, time:time, pax:pax,
    status:'pending',
    created: new Date().toISOString()
  });

  currentRideKey = ref.key;
  document.getElementById('form-view').style.display = 'none';
  document.getElementById('tracking-view').style.display = 'block';
  watchRide(currentRideKey);
});

document.getElementById('newbtn').addEventListener('click', function(){
  document.getElementById('form-view').style.display = 'block';
  document.getElementById('tracking-view').style.display = 'none';
  document.getElementById('name').value = '';
  document.getElementById('phone').value = '';
  document.getElementById('from').value = '';
  document.getElementById('to').value = '';
  document.getElementById('time').value = '';
  document.getElementById('step1').className = 'step active';
  document.getElementById('step2').className = 'step';
  document.getElementById('step3').className = 'step';
  document.getElementById('step2-sub').textContent = 'En attente...';
  currentRideKey = null;
});

initFirebase();
</script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</body>
</html>
