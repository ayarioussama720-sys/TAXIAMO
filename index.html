<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaxiNow Client</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap');
    :root{--bg:#0d1117;--card:#161b22;--panel:#21262d;--gold:#f0a500;--text:#e6edf3;--muted:#8b949e}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
    #topbar{padding:12px 16px;background:var(--card);display:flex;align-items:center;gap:10px;flex-shrink:0}
    .logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#f0a500,#c47f00);display:flex;align-items:center;justify-content:center;font-size:18px}
    .logo-text{font-weight:800;font-size:17px}
    #msgs{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:10px}
    .msg{display:flex;gap:8px;align-items:flex-end}
    .msg.me{justify-content:flex-end}
    .avatar{width:28px;height:28px;border-radius:9px;background:linear-gradient(135deg,#f0a500,#c47f00);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
    .bubble{max-width:80%;padding:11px 15px;font-size:13.5px;border-radius:16px;line-height:1.6;word-wrap:break-word}
    .msg.bot .bubble{background:var(--panel)}
    .msg.me .bubble{background:linear-gradient(135deg,#f0a500,#c47f00);color:#000;font-weight:600}
    #bar{padding:10px 14px;display:flex;gap:8px;border-top:1px solid var(--panel)}
    #inp{flex:1;background:var(--panel);border:1px solid var(--panel);border-radius:12px;padding:11px 14px;color:var(--text);font-family:'Sora',sans-serif;font-size:14px}
    #sbtn{width:44px;height:44px;border-radius:12px;border:none;background:linear-gradient(135deg,#f0a500,#c47f00);color:#000;cursor:pointer;font-size:18px}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:999}
    .modal.hide{display:none}
    .mbox{background:var(--card);border-radius:20px;padding:24px;width:100%;max-width:360px;text-align:center}
    .mbox h2{font-size:18px;margin-bottom:8px}
    .mbox p{font-size:13px;color:var(--muted);margin-bottom:20px}
    .mbox input{width:100%;padding:12px;border-radius:12px;border:none;background:var(--panel);color:var(--text);margin-bottom:12px;font-family:'Sora',sans-serif}
    .mbox button{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#f0a500,#c47f00);color:#000;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif}
  </style>
</head>
<body>

<div class="modal" id="modal">
  <div class="mbox">
    <h2>🔑 Clé API</h2>
    <p>Entrez votre clé Anthropic</p>
    <input id="key" type="password" placeholder="sk-ant-..."/>
    <button onclick="saveKey()">Démarrer 🚖</button>
  </div>
</div>

<div id="topbar">
  <div class="logo-icon">🚖</div>
  <div class="logo-text">TaxiNow Client</div>
</div>

<div id="msgs"></div>

<div id="bar">
  <input id="inp" type="text" placeholder="Votre message..."/>
  <button id="sbtn" onclick="send()">➤</button>
</div>

<script>
var key='', hist=[], busy=false;
var SYS='Tu es assistant réservation taxi. Collecte prénom, départ, destination, heure, passagers. Quand complet, réponds JSON: {"ok":true,"name":"X","from":"Y","to":"Z","time":"H","pax":N}';

function saveKey(){
  var k=document.getElementById('key').value.trim();
  if(!k.startsWith('sk-ant-')){alert('Clé invalide!');return;}
  key=k;
  localStorage.setItem('taxinow_key',k);
  document.getElementById('modal').classList.add('hide');
  document.getElementById('msgs').innerHTML='<div class="msg bot"><div class="avatar">🚖</div><div class="bubble">Bonjour! Quel est votre prénom?</div></div>';
}

function send(){
  var txt=document.getElementById('inp').value.trim();
  if(!txt||busy||!key)return;
  document.getElementById('inp').value='';
  hist.push({role:'user',content:txt});
  addMsg(txt,'me');
  busy=true;
  
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:500,system:SYS,messages:hist})
  })
  .then(r=>r.json())
  .then(d=>{
    var rep=d.content?d.content[0].text:'Erreur';
    var clean=rep.replace(/```json/g,'').replace(/```/g,'').trim();
    try{
      var j=JSON.parse(clean);
      if(j.ok){
        var rides=JSON.parse(localStorage.getItem('taxinow_rides')||'[]');
        rides.unshift({id:Date.now(),name:j.name,from:j.from,to:j.to,time:j.time,pax:j.pax,status:'pending'});
        localStorage.setItem('taxinow_rides',JSON.stringify(rides));
        addMsg('✅ Course réservée!','bot');
        return;
      }
    }catch(e){}
    hist.push({role:'assistant',content:rep});
    addMsg(rep,'bot');
  })
  .catch(e=>{addMsg('Erreur!','bot');})
  .finally(()=>{busy=false;});
}

function addMsg(txt,role){
  var d=document.createElement('div');
  d.className='msg '+role;
  d.innerHTML=(role==='bot'?'<div class="avatar">🚖</div>':'')+'<div class="bubble">'+txt+'</div>';
  document.getElementById('msgs').appendChild(d);
  document.getElementById('msgs').scrollTop=document.getElementById('msgs').scrollHeight;
}

window.onload=function(){
  var k=localStorage.getItem('taxinow_key');
  if(k){key=k;document.getElementById('modal').classList.add('hide');}
};
</script>
</body>
</html>
